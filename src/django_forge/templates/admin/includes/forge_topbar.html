<header class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur px-6 flex items-center justify-between">
  <div>
    <h1 class="text-lg font-semibold text-slate-900 dark:text-slate-100">{{ title }}</h1>
    {% if subtitle %}<p class="text-sm text-slate-500">{{ subtitle }}</p>{% endif %}
  </div>
  <div class="flex items-center gap-2">
    {% if forge.enable_command_bar %}
      <input type="search" placeholder="Search or run command..." class="rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm w-64">
    {% endif %}
    {% if user.is_authenticated %}
      <span class="text-sm text-slate-600 dark:text-slate-300">{{ user.get_username }}</span>
      <a class="text-sm text-blue-600 hover:text-blue-500" href="{% url 'admin:logout' %}">Sign out</a>
    {% endif %}
  </div>
</header>

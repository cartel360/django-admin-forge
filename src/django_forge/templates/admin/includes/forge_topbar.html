<header class="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur px-4 md:px-6 py-3">
  <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
    <div>
      <h1 class="text-lg font-semibold text-slate-900 dark:text-slate-100">{{ title }}</h1>
      {% if subtitle %}<p class="text-sm text-slate-500">{{ subtitle }}</p>{% endif %}
    </div>
    <div class="flex flex-col sm:flex-row sm:items-center gap-2">
      {% if forge.enable_command_bar %}
        <div class="relative">
          <span class="pointer-events-none absolute left-3 top-2.5 text-xs text-slate-400">⌘K</span>
          <input
            type="search"
            placeholder="Search models, records, commands..."
            data-global-search
            class="rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 pl-12 pr-3 py-2 text-sm w-full sm:w-80 focus:outline-none focus:ring-2 focus:ring-slate-300 dark:focus:ring-slate-600"
          >
          <div class="hidden absolute z-30 mt-2 w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-lg p-1 max-h-72 overflow-auto" data-global-search-results></div>
        </div>
      {% endif %}
    </div>
  </div>
</header>
